<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Website</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="nav-bar">
      <div class="profile-icon"></div>
      <div class="theme-toggle" type="button"></div>
    </nav>
    <button id="menu-icon" onclick="toggleMenu()"></button>
    <aside class="side-bar">
      <div class="profile">
        <div class="code-snippet1">&lt;div&gt;</div>
        <div id="profile-text">
          <p id="name">Prashant</p>
          <p id="WebD">Web Developer</p>
        </div>
        <div class="code-snippet1">&lt;/div&gt;</div>
      </div>
      <ul>
        <li class="clicked"><a href="#home-sec">.home()</a></li>
        <li><a href="#about-sec">.about()</a></li>
        <li><a href="#resume-sec">.resume()</a></li>
        <li><a href="#projects-sec">.projects()</a></li>
        <li><a href="#contact-sec">.contact()</a></li>
      </ul>
      <div class="overlay"></div>
    </aside>
    <main>
      <section id="home-sec" class="main-home">
        <div class="code-snippet2">&lt;main&gt;</div>
        <div class="main-text">
          <h2 id="web">Front-End</h2>
          <h2 id="dev">Developer</h2>
        </div>
        <p id="paragraph">
          Lorem ipsum dolor sit amet consectetur, adipisicing elit. Vel suscipit
          nostrum laboriosam possimus amet saepe! Nostrum aut vero dolores esse.
        </p>

        <div class="code-snippet2">&lt;/main&gt;</div>
        <div class="handles">
          <a href="https://google.com" target="_blank" class="svg-link">
            <img
              src="./Resources/github-142-svgrepo-com.svg"
              height="30px"
              alt="github"
            />
          </a>
          <a href="https://google.com" target="_blank" class="svg-link">
            <img
              src="./Resources/linkedin-1.svg"
              height="31px"
              alt="linkedin"
            />
          </a>
          <a href="https://google.com" target="_blank" class="svg-link">
            <img
              src="./Resources/gmail-svgrepo-com.svg"
              height="32px"
              alt="gmail"
            />
          </a>
          <div class="vertical-line"></div>
        </div>
      </section>
      <section id="about-sec" class="main-about border"></section>
      <section id="contact-sec" class="main-contact border"></section>
      <section id="projects-sec" class="main-projects border"></section>
      <section id="resume-sec" class="main-resume border"></section>
    </main>
    <script src="./index.js" charset="UTF-8"></script>
  </body>
</html>
